name: flutter_factory
description: A Mason-powered CLI for generating production-ready Flutter applications, features, pages, services, and use cases.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

executables:
  flutter_factory: flutter_factory

dependencies:
  args: ^2.6.0
  cli_dialog: ^0.5.0
  cli_completion: ^0.5.1
  mason: ^0.1.0
  mason_logger: ^0.3.1
  path: ^1.9.1
  pub_updater: ^0.5.0
  yaml: ^3.1.3

dev_dependencies:
  lints: ^5.1.1
  test: ^1.25.14
